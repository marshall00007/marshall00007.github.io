<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>XUNIVERSE — Private Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syne:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root{--bg:#05070a;--card:#0d1117;--accent:#3d7fff;--text:#e6edf3;--border:#30363d;--green:#238636;}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
        
        /* Stylish Glowing Logo */
        .logo-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(61, 127, 255, 0.6);
            margin-bottom: 30px;
            text-align: center;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.05); } }

        .page{display:none;min-height:100vh;padding:20px;padding-top:80px;flex-direction:column;align-items:center;}
        .page.active{display:flex}
        
        .topbar{position:fixed;top:0;width:100%;height:60px;background:rgba(5,7,10,0.8);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);z-index:100;}
        .logo-small{font-family:'Orbitron',sans-serif;color:var(--accent);font-weight:900;letter-spacing:2px;}

        /* Vertical Dashboard Layout */
        .vertical-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;cursor:pointer;transition:0.3s;text-align:center;}
        .card:hover{border-color:var(--accent); transform: translateY(-3px);}
        
        input, textarea{width:100%;padding:14px;background:#161b22;border:1px solid var(--border);border-radius:8px;color:#fff;margin-bottom:15px;font-family:inherit;}
        .btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;font-size:1rem;}
        
        #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);padding:12px 24px;border-radius:8px;display:none;z-index:1000;font-weight:bold;}
        .vault-item{background:#161b22;border:1px solid var(--border);padding:15px;border-radius:8px;margin-bottom:10px;text-align:left;}
    </style>
</head>
<body>

<div class="topbar"><div class="logo-small">XUNIVERSE</div><button id="logoutBtn" style="display:none;background:none;border:1px solid var(--border);color:#8b949e;padding:5px 10px;border-radius:4px;" onclick="location.reload()">Logout</button></div>
<div id="toast">Success!</div>

<div class="page active" id="pg-login">
    <div class="logo-main">XUNIVERSE</div>
    <div class="card" style="max-width:400px; cursor:default;">
        <h2 style="margin-bottom:20px;">Access Terminal</h2>
        <input type="text" id="user-id" placeholder="User ID" onkeydown="if(event.key==='Enter') handleLogin()"/>
        <input type="password" id="user-pw" placeholder="Password" onkeydown="if(event.key==='Enter') handleLogin()"/>
        <button class="btn" onclick="handleLogin()">ENTER UNIVERSE</button>
    </div>
</div>

<div class="page" id="pg-dash">
    <div class="vertical-menu">
        <div class="card" onclick="showPage('pg-wish')"><h3>🌟 Wish Me</h3><p>Drop a message</p></div>
        <div class="card" onclick="showPage('pg-store')"><h3>📁 Store</h3><p>Upload Files/Videos</p></div>
        <div class="card" onclick="showPage('pg-contact')"><h3>📞 Save Contact</h3><p>Send your number</p></div>
        <div class="card" onclick="showPage('pg-music')"><h3>🎵 Music</h3><p>Upload Audio</p></div>
        <div id="admin-card" class="card" style="display:none;border:2px solid var(--accent);" onclick="openVault()">
            <h3 style="color:var(--accent);">🛡️ OWNER VAULT</h3><p>Private Access</p>
        </div>
    </div>
</div>

<div class="page" id="pg-wish"><div class="card" style="max-width:450px;"><h3>Send a Wish</h3><br><input id="w-name" placeholder="Your Name"/><textarea id="w-msg" placeholder="Your Message"></textarea><button class="btn" onclick="sendWish()">SEND WISH</button><button class="btn" style="background:#30363d;margin-top:10px;" onclick="showPage('pg-dash')">BACK</button></div></div>
<div class="page" id="pg-store"><div class="card" style="max-width:450px;"><h3>Upload to Store</h3><br><input type="file" id="f-store" onchange="up('store', 'f-store')"/><button class="btn" style="background:#30363d;margin-top:10px;" onclick="showPage('pg-dash')">BACK</button></div></div>
<div class="page" id="pg-contact"><div class="card" style="max-width:450px;"><h3>Save Contact</h3><br><input id="c-name" placeholder="Contact Name"/><input id="c-num" placeholder="Phone Number"/><button class="btn" onclick="sendContact()">SAVE CONTACT</button><button class="btn" style="background:#30363d;margin-top:10px;" onclick="showPage('pg-dash')">BACK</button></div></div>
<div class="page" id="pg-music"><div class="card" style="max-width:450px;"><h3>Upload Music</h3><br><input type="file" id="f-music" accept="audio/*" onchange="up('music', 'f-music')"/><button class="btn" style="background:#30363d;margin-top:10px;" onclick="showPage('pg-dash')">BACK</button></div></div>

<div class="page" id="pg-vault">
    <button class="btn" style="max-width:150px;margin-bottom:20px;background:#30363d" onclick="showPage('pg-dash')">← BACK</button>
    <div class="vertical-menu" style="max-width:800px;">
        <div><h3 style="margin-bottom:10px;">📥 Wishes</h3><div id="v-wishes"></div></div>
        <div><h3 style="margin-bottom:10px;">📞 Contacts</h3><div id="v-contacts"></div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://tvjztcrrpyunwmkuaisi.supabase.co';
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2anp0Y3JycHl1bndta3VhaXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTM2MjIsImV4cCI6MjA5MzE4OTYyMn0.Df8stpBfdXG68CBxrY0NV1IjschcX3m_cF480qF3p0Y';
const _sb = supabase.createClient(S_URL, S_KEY);

function showPage(id){ 
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
}

function handleLogin(){ 
    if(document.getElementById('user-id').value==='Marshall' && document.getElementById('user-pw').value==='123456798'){ 
        document.getElementById('admin-card').style.display='block'; 
        document.getElementById('logoutBtn').style.display='block'; 
        showPage('pg-dash'); 
    } else { alert("Access Denied"); } 
}

function openVault(){ 
    if(prompt("Security Key:")==='Ankit@9905296'){ showPage('pg-vault'); loadV(); } 
}

async function sendWish(){
    const {error} = await _sb.from('Wishes').insert([{ Name: document.getElementById('w-name').value, Text: document.getElementById('w-msg').value }]);
    if(error) alert(error.message); else { toast("Wish Sent!"); document.getElementById('w-name').value=''; document.getElementById('w-msg').value=''; }
}

async function sendContact(){
    const {error} = await _sb.from('Contacts').insert([{ Name: document.getElementById('c-name').value, Number: document.getElementById('c-num').value }]);
    if(error) alert(error.message); else { toast("Saved!"); document.getElementById('c-name').value=''; document.getElementById('c-num').value=''; }
}

async function up(bucket, id){
    const file = document.getElementById(id).files[0];
    if(!file) return;
    toast("Uploading...");
    const {error} = await _sb.storage.from(bucket).upload(`${Date.now()}_${file.name}`, file);
    if(error) alert(error.message); else toast("Upload Successful!");
}

async function loadV(){
    const {data:w} = await _sb.from('Wishes').select('*');
    document.getElementById('v-wishes').innerHTML = w ? w.map(x=>`<div class="vault-item"><b>${x.Name}:</b> ${x.Text}</div>`).join('') : '';
    const {data:c} = await _sb.from('Contacts').select('*');
    document.getElementById('v-contacts').innerHTML = c ? c.map(x=>`<div class="vault-item"><b>${x.Name}:</b> ${x.Number}</div>`).join('') : '';
}

function toast(m){ const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
</script>
</body>
</html>
